<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản Lý Lịch Hẹn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f8fafc;
        }

        .auth-container {
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
            margin: 0 0 8px 0;
        }

        .auth-subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0 0 24px 0;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .form-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background-color: #1e293b;
        }

        .btn-auth {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .toggle-text {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 20px;
        }

        .toggle-link {
            color: #a78bfa;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .toggle-link:hover {
            color: #c4b5fd;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .form-section.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginSection" class="form-section active">
            <h1 class="auth-title">Chào mừng trở lại</h1>
            <p class="auth-subtitle">Đăng nhập để quản lý lịch hẹn của bạn</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-auth">Đăng Nhập</button>
            </form>
            <div class="toggle-text">
                Chưa có tài khoản? <span class="toggle-link" onclick="toggleForms()">Đăng ký ngay</span>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerSection" class="form-section">
            <h1 class="auth-title">Tạo tài khoản mới</h1>
            <p class="auth-subtitle">Bắt đầu quản lý lịch trình của bạn ngay hôm nay</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>Tên của bạn</label>
                    <input type="text" id="regName" placeholder="Nhập họ tên" required>
                </div>
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="regUsername" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="regPassword" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-auth">Đăng Ký</button>
            </form>
            <div class="toggle-text">
                Đã có tài khoản? <span class="toggle-link" onclick="toggleForms()">Đăng nhập ngay</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5182/api/auth';

        function toggleForms() {
            document.getElementById('loginSection').classList.toggle('active');
            document.getElementById('registerSection').classList.toggle('active');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('calendarUserId', data.userID);
                    window.location.href = 'index.html';
                } else {
                    const err = await res.text();
                    alert("Đăng nhập thất bại: " + err);
                }
            } catch (err) {
                console.error(err);
                alert("Lỗi kết nối.");
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password })
                });

                if (res.ok) {
                    alert("Đăng ký thành công! Vui lòng đăng nhập.");
                    toggleForms();
                } else {
                    const err = await res.text();
                    alert("Đăng ký thất bại: " + err);
                }
            } catch (err) {
                console.error(err);
                alert("Lỗi kết nối.");
            }
        });
    </script>
</body>

</html>
